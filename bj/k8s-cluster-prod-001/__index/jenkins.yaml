apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
spec:
  destination:
    name: 'jenkins'
    namespace: 'jenkins'
    server: 'https://kubernetes.default.svc'
  source:
    path: bj/k8s-cluster-prod-001/jenkins
    repoURL: 'git@github.com:whh881114/argocd-manifests.git'
    targetRevision: master
    directory:
      recurse: true
  sources: []
  project: default